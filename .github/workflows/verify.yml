name: verify

on:
  push:
  pull_request:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stainless:
    runs-on: ubuntu-latest
    env:
      STAINLESS_VERSION: "0.9.9.3" # must match stainless/ and the Scala 3.7.2 plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Install z3 (smt-z3 solver)
        run: sudo apt-get update && sudo apt-get install -y z3

      # The 87 MB stainless-dotty-plugin jar is gitignored (not committed), unlike
      # project/lib/sbt-stainless.jar which is. Cache and restore only the missing
      # compiler-plugin artifact.
      - name: Cache Stainless compiler plugin
        uses: actions/cache@v4
        with:
          path: stainless/ch/epfl/lara/stainless-dotty-plugin_3.7.2
          key: stainless-plugin-${{ env.STAINLESS_VERSION }}

      - name: Fetch Stainless plugin (on cache miss)
        run: |
          PLUGIN_JAR="stainless/ch/epfl/lara/stainless-dotty-plugin_3.7.2/${STAINLESS_VERSION}/stainless-dotty-plugin_3.7.2-${STAINLESS_VERSION}.jar"
          if [ -f "$PLUGIN_JAR" ]; then
            echo "Plugin restored from cache: $PLUGIN_JAR"
          else
            echo "Cache miss; downloading sbt-stainless.zip"
            curl -fsSL -o sbt-stainless.zip \
              "https://github.com/epfl-lara/stainless/releases/download/v${STAINLESS_VERSION}/sbt-stainless.zip"
            unzip -o -q sbt-stainless.zip
            test -f "$PLUGIN_JAR" || { echo "::error::plugin jar missing after unzip"; exit 1; }
          fi

      - name: Compile and verify
        run: |
          set -o pipefail
          sbt compile 2>&1 | tee verify.log
          # Stainless reports failed VCs as warnings and still exits 0, so the
          # success of `sbt compile` alone does NOT mean verification passed.
          # Fail the job if any verification condition is not valid.
          if grep -qE '=> (INVALID|UNKNOWN|TIMEOUT|CANCELLED)' verify.log; then
            echo "::error::Stainless reported non-valid verification conditions"
            exit 1
          fi
